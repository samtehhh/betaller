name: Create iOS Distribution Certificate

on:
  workflow_dispatch:

jobs:
  create-cert:
    runs-on: macos-latest
    steps:
      - name: Create iOS Distribution Certificate
        env:
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          pip3 install pyjwt cryptography --break-system-packages
          echo  | base64 --decode > cert_script.py
          python3 cert_script.py

      - name: Upload certificate
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: distribution-certificate
          path: |
            distribution.cer
            dist.key
          if-no-files-found: warn
