name: Create iOS Distribution Certificate and Provisioning Profile

on:
  workflow_dispatch:

jobs:
  create-cert:
    runs-on: macos-latest
    steps:
      - name: Create certificate and provisioning profile
        env:
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          pip3 install pyjwt cryptography --break-system-packages

          # Step A: Create iOS Distribution Certificate
          echo  | base64 --decode > profile_script.py
          python3 profile_script.py
