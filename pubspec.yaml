name: boyuzatma_app
description: "BeTaller - Büyüme Potansiyelini Keşfet"
publish_to: 'none'
version: 1.1.0+14

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  fl_chart: ^0.70.2
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.2
  flutter_timezone: ^5.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  purchases_flutter: ^9.16.1
  purchases_ui_flutter: ^9.16.1
  in_app_review: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  ios_content_mode: scaleAspectFill
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "#0A0A14"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/icon_2.png
    - assets/exercises/
    - assets/testimonials/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900
